print_alert:
  name: Print alert
  description: >
    Print the large, centered B.A.N.U.S.U.G.E security-alert receipt layout.
  target: *notify_target
  fields:
    content:
      name: Alert message
      required: true
      selector:
        text:
          multiline: true
    timestamp:
      name: Sent timestamp
      description: >
        Optional "sent" timestamp, format "yyyy-MM-dd HH:mm:ss". Defaults to
        the device's current time if omitted.
      selector:
        text:
    lines_after:
      name: Lines after
      description: >
        Optional. If omitted, the app's own configured default (Settings ->
        Lines After Content on the device, 3 by default) is used.
      selector:
        number:
          min: 0
          max: 20

