print_image:
  name: Print image
  description: >
    Print an image, either fetched by the device itself from a URL, or
    captured from a Home Assistant camera/image entity and sent inline.
    Specify exactly one of "url" or "image_entity".
  target: *notify_target
  fields:
    url:
      name: Image URL
      description: >
        An http(s) URL the device will fetch itself. Mutually exclusive
        with Image entity.
      selector:
        text:
    image_entity:
      name: Image entity
      description: >
        A camera or image entity to snapshot, base64-encode, and send.
        Mutually exclusive with Image URL.
      selector:
        entity:
          domain:
            - image
            - camera
    lines_after:
      name: Lines after
      description: >
        Optional. If omitted, the app's own configured default (Settings ->
        Lines After Content on the device, 3 by default) is used.
      selector:
        number:
          min: 0
          max: 20

print_raw:
  name: Print raw job
  description: >
    Escape hatch for advanced use: send an arbitrary PrintJob "type" and
    extra fields directly, without integration-side validation. Useful for
    device print types added to the Android app after this integration was
    written.
  target: *notify_target
  fields:
    type:
      name: Type
      required: true
      description: The PrintJob "type" value, e.g. "plain", "qr", "alert".
      selector:
        text:
    data:
      name: Extra fields
      description: >
        Arbitrary extra PrintJob fields (title, content, alignment,
        titleSize, etc., using the device's camelCase key names) merged
        verbatim into the JSON body alongside "type".
      selector:
        object:
