print_text:
  name: Print text
  description: >
    Print plain, centered, or header+body text. For boxed/banner/list/alert
    layouts use their dedicated services instead.
  target: &notify_target
    entity:
      - integration: sunmi_printer
        domain: notify
  fields:
    format:
      name: Format
      selector:
        select:
          options:
            - plain
            - centered
            - header_body
      default: plain
    title:
      name: Title
      selector:
        text:
    content:
      name: Content
      required: true
      selector:
        text:
          multiline: true
    title_size:
      name: Title size
      selector:
        number:
          min: 8
          max: 120
          unit_of_measurement: px
      default: 32
    content_size:
      name: Content size
      selector:
        number:
          min: 8
          max: 120
          unit_of_measurement: px
      default: 26
    center_title:
      name: Center title
      selector:
        boolean:
      default: false
    alignment:
      name: Alignment
      selector:
        select:
          options:
            - left
            - center
            - right
      default: left
    lines_after:
      name: Lines after
      description: >
        Optional. If omitted, the app's own configured default (Settings ->
        Lines After Content on the device, 3 by default) is used.
      selector:
        number:
          min: 0
          max: 20

